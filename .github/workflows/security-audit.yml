name: Security audit

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 23 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: root-template
            directory: .
          - name: sichinohe-web
            directory: resorts/Sichinohe-CyoueiSki/web
          - name: sichinohe-scripts
            directory: resorts/Sichinohe-CyoueiSki/scripts

    defaults:
      run:
        working-directory: ${{ matrix.directory }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ matrix.directory }}/package-lock.json

      - name: Install (npm ci)
        run: npm ci

      - name: npm audit (high+)
        run: npm audit --audit-level=high
