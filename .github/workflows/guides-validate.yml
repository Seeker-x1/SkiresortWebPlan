name: Guides validate

on:
  push:
    branches: [main, master]
    paths:
      - "data/**"
      - "docs/mock-assets/**"
      - "guides/**"
      - "scripts/sync-japow-resort-index.mjs"
      - "scripts/validate-resort-guides-ids.mjs"
      - ".github/workflows/guides-validate.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "data/**"
      - "docs/mock-assets/**"
      - "guides/**"
      - "scripts/sync-japow-resort-index.mjs"
      - "scripts/validate-resort-guides-ids.mjs"
      - ".github/workflows/guides-validate.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: JAPOW id ↔ resort-guides contract
        run: node scripts/validate-resort-guides-ids.mjs

      - name: Mock LP i18n and shell
        run: |
          node docs/mock-assets/scripts/validate-mock-i18n.mjs
          node docs/mock-assets/scripts/validate-mock-html-i18n.mjs
          node docs/mock-assets/scripts/validate-mock-lp-shell.mjs
          node docs/mock-assets/scripts/validate-mock-lp-copy.mjs

      - name: Guides sync smoke
        run: node guides/scripts/sync.mjs
