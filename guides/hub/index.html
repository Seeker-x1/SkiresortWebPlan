<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>スキー場ガイド — 11施設</title>
  <meta name="description" content="北海道・東北・新潟のスキー場ガイド。" />
  <link rel="stylesheet" href="_shared/mock-hub.css" />
  <link rel="stylesheet" href="_shared/mock-i18n.css" />
</head>
<body>
  <header class="inner header-row">
    <div>
      <p class="eyebrow" data-i18n="hero.eyebrow">JAPOWSERCH</p>
      <h1 class="hero-title" data-i18n-html="hero.title">スキー場ガイド<br />11施設</h1>
    </div>
    <div class="lang-switch" role="group" data-i18n-attr="aria-label:lang.switch">
      <button type="button" data-lang-switch="ja" aria-pressed="true">JA</button>
      <button type="button" data-lang-switch="en" aria-pressed="false">EN</button>
    </div>
  </header>

  <main class="inner">
    <p class="lead" data-i18n="hero.lead">各スキー場のガイドページへ。</p>

    <div class="hub-table-wrap">
      <table>
        <thead>
          <tr>
            <th data-i18n="table.id">施設番号</th>
            <th data-i18n="table.name">施設名</th>
            <th data-i18n="table.region">地域</th>
            <th data-i18n="table.strategy">特徴</th>
            <th data-i18n="table.preview">ガイド</th>
          </tr>
        </thead>
        <tbody id="resort-table-body"></tbody>
      </table>
    </div>
  </main>

  <script src="_shared/mock-hub.js"></script>
</body>
</html>
