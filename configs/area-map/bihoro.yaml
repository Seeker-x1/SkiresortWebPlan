        ja: "冬の蒸気霧とサンセット—カメラを持つインバウンドの聖地"
        en: "Winter steam mist at sunset—a photographer magnet"
    - id: mashu
      label: { ja: 摩周湖, en: Lake Mashu }
      hook:
        ja: "世界一の透明度—霧に包まれたカルデラ湖"
        en: "One of the clearest lakes—mist-shrouded caldera"
  foodHighlights:
    - hook:
        ja: "道東の海鮮・ジンギスカン—スキー後のエネルギー補給"
        en: "East Hokkaido seafood and Genghis Khan after slopes"

