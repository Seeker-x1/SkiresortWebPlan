<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>周辺マップ — 美瑛 LP案モック</title>
  <meta name="description" content="美瑛周辺の飲食・温泉・拠点を町民スキー場起点のマップで確認。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=Noto+Sans+JP:wght@400;500;600;700&family=Syne:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="_shared/area-map.css" />
  <link rel="stylesheet" href="_shared/mock-i18n.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    (function () {
      const cur =
        new URLSearchParams(location.search).get("lang") ||
        localStorage.getItem("mock-lp-locale") ||
        "ja";
      document.documentElement.lang = cur === "en" ? "en" : "ja";
    })();
  </script>
</head>
<body class="area-map-page">
  <header class="area-topbar">
    <div>
      <a href="#" id="area-top-link">← トップに戻る</a>
      <span aria-hidden="true"> · </span>
      <span class="logo" id="area-resort-name">周辺マップ</span>
    </div>
    <div class="area-topbar-actions">
      <div class="lang-switch" role="group" aria-label="Language">
        <button type="button" data-lang-switch="ja">JA</button>
        <button type="button" data-lang-switch="en">EN</button>
      </div>
    </div>
  </header>

  <div class="area-shell">
    <div class="area-stage" id="area-stage">
      <p class="map-error">読み込み中…</p>
    </div>

    <aside class="area-rail" aria-label="周辺スポット">
      <div class="area-rail-head">
        <h1 class="area-rail-title" id="area-rail-title">周辺マップ</h1>
        <p class="area-rail-lead" id="area-rail-lead">雪遊び・青い池と組み合わせる飲食スポット</p>
        <div class="area-filter" id="area-filters" role="group"></div>
        <p class="area-filter-hint" id="area-filter-hint"></p>
      </div>
      <div class="area-list" id="area-list" role="list"></div>
    </aside>
  </div>

  <script>
    document.querySelectorAll("[data-lang-switch]").forEach((btn) => {
      btn.addEventListener("click", () => {
        const lang = btn.dataset.langSwitch;
        const u = new URL(location.href);
        u.searchParams.set("lang", lang);
        localStorage.setItem("mock-lp-locale", lang);
        location.href = u.toString();
      });
    });
    const cur = new URLSearchParams(location.search).get("lang") || localStorage.getItem("mock-lp-locale") || "ja";
    document.documentElement.lang = cur === "en" ? "en" : "ja";
    document.querySelectorAll("[data-lang-switch]").forEach((b) => {
      const on = b.dataset.langSwitch === cur;
      b.setAttribute("aria-pressed", on ? "true" : "false");
      b.setAttribute("aria-current", on ? "true" : "false");
    });
  </script>
  <script src="_shared/area-map.js"></script>
</body>
</html>
